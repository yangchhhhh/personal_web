<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>fovus-星际流光</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-size: 4rem;
            margin: 0;
            text-shadow: 0 0 20px #00ffff;
            opacity: 0.9;
        }
        p {
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 10px;
        }
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #fff;
        }
        .hidden {
            display: none !important;
        }
        #start-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.5rem;
            background: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        #start-btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }
        /* 暂停菜单样式 */
        #pause-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            pointer-events: auto;
        }
        .pause-box {
            background: #222;
            border: 2px solid #555;
            border-radius: 10px;
            padding: 40px;
            width: 300px;
            text-align: center;
            color: white;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }
        .pause-box button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 10px;
            transition: 0.2s;
        }
        .pause-box button:hover {
            transform: scale(1.05);
            background: #6fbf6f;
        }
    </style>
</head>
<body>

    <div id="score-board">SCORE: 0</div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="menu">
            <h1>NEON ORBIT</h1>
            <p>点击鼠标 或 按空格键 改变旋转方向</p>
            <p>躲避飞出的粒子 · 享受心流时刻</p>
            <button id="start-btn">开始游戏</button>
        </div>
        <div id="game-over" class="hidden">
            <h1 style="color: #ff4444; text-shadow: 0 0 20px #ff0000;">GAME OVER</h1>
            <p id="final-score">得分: 0</p>
            <button id="restart-btn" style="
                margin-top: 20px;
                padding: 10px 30px;
                font-size: 1.2rem;
                background: transparent;
                border: 2px solid #ff4444;
                color: #ff4444;
                border-radius: 50px;
                cursor: pointer;
                pointer-events: auto;
                transition: all 0.3s;
            ">再试一次</button>
        </div>
    </div>

    <!-- 暂停菜单 -->
    <div id="pause-menu">
        <div class="pause-box">
            <h1>游戏暂停</h1>
            <button onclick="resumeGame()">继续游戏</button><br>
            <button onclick="returnToGallery()">返回游戏库</button><br>
            <button onclick="toggleFullScreen()">全屏模式</button>
        </div>
    </div>

<script>
    let gameTimer = null;
    function stopGame() {
        isPlaying = false;
        isPaused = false;
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        if (gameTimer) {
            clearTimeout(gameTimer);
            gameTimer = null;
        }
    }
    function returnToGallery() {
        stopGame();
        try {
            if (window.parent && window.parent !== window && typeof window.parent.backToGallery === 'function') {
                window.parent.backToGallery();
                return;
            }
        } catch (err) {
            console.warn('无法调用 parent.backToGallery：', err);
        }
        try {
            if (window.top && window.top !== window) {
                window.top.location.href = 'index.html#game';
                return;
            }
        } catch (err) {
            console.warn('无法调用 top.location：', err);
        }
        window.location.href = 'index.html#game';
    }
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const PERFORMANCE = {
        MAX_PARTICLES: 80,
        MAX_OBSTACLES: 30,
        PARTICLE_LIFETIME: 50,
        TRAIL_LENGTH: 15,
        FPS: 60
    };
    
    let isPlaying = false;
    let isPaused = false;
    let score = 0;
    let animationId;
    
    let w, h, cx, cy;
    
    const player = {
        angle: 0,
        radius: 100,
        speed: 0.05,
        size: 8,
        color: '#00ffff',
        trail: []
    };

    let obstacles = [];
    let particles = [];
    
    let spawnRate = 60;
    let frameCount = 0;
    let gameSpeed = 2;

    const pauseMenu = document.getElementById('pause-menu');

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        cx = w / 2;
        cy = h / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        if (type === 'switch') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'score') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'crash') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    function switchDirection() {
        if (!isPlaying || isPaused) return;
        player.speed *= -1;
        createParticles(getPlayerPos().x, getPlayerPos().y, player.color, 3);
        playSound('switch');
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (isPlaying && !isPaused) {
                isPaused = true;
                pauseMenu.style.display = 'flex';
            } else if (isPaused) {
                resumeGame();
            }
        }
        if (e.code === 'Space') switchDirection();
    });
    document.addEventListener('mousedown', (e) => {
        if(e.target.tagName !== 'BUTTON') switchDirection();
    });

    function resumeGame() {
        isPaused = false;
        pauseMenu.style.display = 'none';
        if (isPlaying && !animationId) {
            loop();
        }
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function getPlayerPos() {
        return {
            x: cx + Math.cos(player.angle) * player.radius,
            y: cy + Math.sin(player.angle) * player.radius
        };
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 3 + 1;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 1.0;
            this.size = Math.random() * 2 + 1;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.02;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            ctx.globalAlpha = 1;
        }
    }

    function createParticles(x, y, color, count) {
        const actualCount = Math.min(count, 5);
        for(let i = 0; i < actualCount; i++) {
            if (particles.length >= PERFORMANCE.MAX_PARTICLES) break;
            particles.push(new Particle(x, y, color));
        }
    }

    function optimizeArrays() {
        if (obstacles.length > PERFORMANCE.MAX_OBSTACLES) {
            obstacles.splice(0, obstacles.length - PERFORMANCE.MAX_OBSTACLES);
        }
        if (particles.length > PERFORMANCE.MAX_PARTICLES) {
            particles.splice(0, particles.length - PERFORMANCE.MAX_PARTICLES);
        }
        if (player.trail.length > PERFORMANCE.TRAIL_LENGTH) {
            player.trail.splice(0, player.trail.length - PERFORMANCE.TRAIL_LENGTH);
        }
    }

    function loop() {
        if (!isPlaying || isPaused) return;
        
        optimizeArrays();
        
        ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
        ctx.fillRect(0, 0, w, h);
        
        player.angle += player.speed;
        const pos = getPlayerPos();
        
        player.trail.push({x: pos.x, y: pos.y});
        if (player.trail.length > 1) {
            ctx.beginPath();
            ctx.strokeStyle = player.color;
            ctx.lineWidth = 2;
            ctx.moveTo(player.trail[0].x, player.trail[0].y);
            for (let i = 1; i < player.trail.length; i++) {
                ctx.globalAlpha = i / player.trail.length;
                ctx.lineTo(player.trail[i].x, player.trail[i].y);
            }
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, player.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.color;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, player.size + 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        frameCount++;
        if (frameCount % spawnRate === 0 && obstacles.length < PERFORMANCE.MAX_OBSTACLES) {
            obstacles.push({
                dist: 0,
                angle: Math.random() * Math.PI * 2,
                speed: gameSpeed,
                color: `hsl(${Math.random() * 360}, 70%, 50%)`
            });
            if (spawnRate > 30) spawnRate -= 0.5;
            gameSpeed += 0.002;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.dist += obs.speed;
            let ox = cx + Math.cos(obs.angle) * obs.dist;
            let oy = cy + Math.sin(obs.angle) * obs.dist;
            
            ctx.fillStyle = obs.color;
            ctx.beginPath();
            ctx.arc(ox, oy, 5, 0, Math.PI * 2);
            ctx.fill();

            let dx = pos.x - ox;
            let dy = pos.y - oy;
            let distance = Math.sqrt(dx*dx + dy*dy);
            if (distance < player.size + 5) {
                gameOver();
                return;
            }
            if (obs.dist > Math.max(w, h) / 1.5) {
                obstacles.splice(i, 1);
                score += 10;
                document.getElementById('score-board').innerText = `SCORE: ${score}`;
                playSound('score');
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
            }
        }

        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(cx, cy, 15, 0, Math.PI * 2);
        ctx.fill();

        gameTimer = setTimeout(() => {
            animationId = requestAnimationFrame(loop);
        }, 1000 / PERFORMANCE.FPS);
    }

    function startGame() {
        stopGame();
        score = 0;
        obstacles = [];
        particles = [];
        player.angle = 0;
        player.trail = [];
        spawnRate = 60;
        gameSpeed = 2;
        frameCount = 0;
        document.getElementById('score-board').innerText = 'SCORE: 0';
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game-over').classList.add('hidden');
        isPlaying = true;
        isPaused = false;
        pauseMenu.style.display = 'none';
        loop();
    }

    function gameOver() {
        stopGame();
        playSound('crash');
        createParticles(getPlayerPos().x, getPlayerPos().y, '#ff0000', 15);
        setTimeout(() => {
             document.getElementById('final-score').innerText = `最终得分: ${score}`;
             document.getElementById('game-over').classList.remove('hidden');
        }, 100);
    }

    document.getElementById('start-btn').addEventListener('click', startGame);
    const restartBtn = document.getElementById('restart-btn');
    restartBtn.addEventListener('click', startGame);
</script>
</body>
</html>
